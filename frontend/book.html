<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomReserve — Book a Room</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-logo">room<span>/</span>reserve</div>
    <div class="topbar-right">
      <span class="topbar-user">Signed in as <strong id="topName"></strong></span>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sign out</button>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section">Menu</div>
    <button class="nav-item" onclick="goTo('dashboard.html')"><span class="icon">◈</span> Dashboard</button>
    <button class="nav-item" onclick="goTo('rooms.html')"><span class="icon">⊞</span> Rooms</button>
    <button class="nav-item active" onclick="goTo('book.html')"><span class="icon">＋</span> Book a Room</button>
    <button class="nav-item" onclick="goTo('bookings.html')"><span class="icon">≡</span> My Bookings</button>
    <div id="adminNav" class="hidden">
      <div class="sidebar-section">Admin</div>
      <button class="nav-item" onclick="goTo('admin-rooms.html')"><span class="icon">⊙</span> Manage Rooms</button>
      <button class="nav-item" onclick="goTo('admin-bookings.html')"><span class="icon">⊛</span> All Bookings</button>
    </div>
    <div class="sidebar-bottom">
      <button class="nav-item" onclick="handleLogout()"><span class="icon">→</span> Sign out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Book a Room</h1>
      <p>Select a room and choose your time slot</p>
    </div>

    <div style="max-width: 540px;">
      <div class="card">
        <div id="bookError"   class="alert alert-error   hidden"></div>
        <div id="bookSuccess" class="alert alert-success hidden"></div>

        <div class="form-group">
          <label class="form-label">Room</label>
          <select id="roomId" class="form-select">
            <option value="">Loading rooms…</option>
          </select>
        </div>

        <!-- Room info preview -->
        <div id="roomInfo" class="hidden" style="background:var(--surface2); border-radius:var(--radius); padding:12px 14px; margin-bottom:16px; font-size:13px; color:var(--muted);">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start Date &amp; Time</label>
            <input id="startTime" type="datetime-local" class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label">End Date &amp; Time</label>
            <input id="endTime" type="datetime-local" class="form-input" />
          </div>
        </div>

        <button id="bookBtn" class="btn btn-primary" onclick="handleBook()">
          Confirm Booking
        </button>
      </div>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  document.getElementById('topName').textContent = currentUserName();
  if (isAdmin()) document.getElementById('adminNav').classList.remove('hidden');
  function goTo(p) { window.location.href = p; }
  async function handleLogout() {
    try { await api.logout(); } catch {}
    sessionStorage.clear(); window.location.href = 'login.html';
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Pre-fill datetime to now + 1hr / +2hr
  function defaultTimes() {
    const now = new Date();
    now.setMinutes(0, 0, 0);
    const start = new Date(now.getTime() + 60 * 60 * 1000);
    const end   = new Date(now.getTime() + 2  * 60 * 60 * 1000);
    const fmt = d => d.toISOString().slice(0, 16);
    document.getElementById('startTime').value = fmt(start);
    document.getElementById('endTime').value   = fmt(end);
  }

  let rooms = [];

  async function loadRooms() {
    try {
      rooms = await api.getRooms();
      const sel = document.getElementById('roomId');
      const available = rooms.filter(r => (r.status || '').toLowerCase() !== 'unavailable');
      if (!available.length) {
        sel.innerHTML = '<option value="">No available rooms</option>';
        return;
      }
      sel.innerHTML = '<option value="">Select a room…</option>' +
        available.map(r => `<option value="${r.id}">${esc(r.name)} — ${esc(r.type || '')} (Cap: ${r.capacity ?? '?'})</option>`).join('');

      // If roomId is in URL params, pre-select it
      const params = new URLSearchParams(window.location.search);
      const preId = params.get('roomId');
      if (preId) { sel.value = preId; showRoomInfo(preId); }
    } catch (err) {
      document.getElementById('bookError').textContent = 'Could not load rooms.';
      document.getElementById('bookError').classList.remove('hidden');
    }
  }

  document.getElementById('roomId').addEventListener('change', e => showRoomInfo(e.target.value));

  function showRoomInfo(id) {
    const room = rooms.find(r => r.id == id);
    const el = document.getElementById('roomInfo');
    if (!room) { el.classList.add('hidden'); return; }
    el.classList.remove('hidden');
    el.innerHTML = `
      <strong style="color:var(--text)">${esc(room.name)}</strong> &nbsp;·&nbsp;
      ${esc(room.type || '')} &nbsp;·&nbsp;
      Location: ${esc(room.location || 'N/A')} &nbsp;·&nbsp;
      Capacity: ${room.capacity ?? '?'}
    `;
  }

  async function handleBook() {
    const roomId    = document.getElementById('roomId').value;
    const startTime = document.getElementById('startTime').value;
    const endTime   = document.getElementById('endTime').value;
    const errEl     = document.getElementById('bookError');
    const okEl      = document.getElementById('bookSuccess');
    const btn       = document.getElementById('bookBtn');

    errEl.classList.add('hidden');
    okEl.classList.add('hidden');

    if (!roomId)    { errEl.textContent = 'Please select a room.';               errEl.classList.remove('hidden'); return; }
    if (!startTime) { errEl.textContent = 'Please choose a start time.';         errEl.classList.remove('hidden'); return; }
    if (!endTime)   { errEl.textContent = 'Please choose an end time.';          errEl.classList.remove('hidden'); return; }
    if (new Date(startTime) >= new Date(endTime)) {
      errEl.textContent = 'End time must be after start time.';
      errEl.classList.remove('hidden'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Booking…';

    // Format for Java LocalDateTime: "2024-05-10T14:00:00"
    const fmt = s => s.length === 16 ? s + ':00' : s;

    try {
      await api.createBooking(currentUserId(), parseInt(roomId), fmt(startTime), fmt(endTime));
      okEl.textContent = 'Room booked successfully!';
      okEl.classList.remove('hidden');
      setTimeout(() => goTo('bookings.html'), 1500);
    } catch (err) {
      errEl.textContent = err.message || 'Booking failed.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Confirm Booking';
    }
  }

  defaultTimes();
  loadRooms();
</script>
</body>
</html>
