<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomReserve — Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">room<span>/</span>reserve</div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Get started with room reservations</p>

    <div id="regError"   class="alert alert-error   hidden"></div>
    <div id="regSuccess" class="alert alert-success hidden"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input id="name" type="text" class="form-input" placeholder="Jane Doe" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-input" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-input" placeholder="Min 6 characters" />
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select id="role" class="form-select">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button id="regBtn" class="btn btn-primary" onclick="handleRegister()">
      Create account
    </button>

    <p class="auth-switch">
      Already have an account? <a onclick="window.location.href='login.html'">Sign in</a>
    </p>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (sessionStorage.getItem('userId')) {
    window.location.href = 'dashboard.html';
  }

  async function handleRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;
    const errEl    = document.getElementById('regError');
    const okEl     = document.getElementById('regSuccess');
    const btn      = document.getElementById('regBtn');

    errEl.classList.add('hidden');
    okEl.classList.add('hidden');

    if (!name || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.remove('hidden');
      return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating…';

    try {
      await api.register(name, email, password, role);
      okEl.textContent = 'Account created! Redirecting to login…';
      okEl.classList.remove('hidden');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch (err) {
      errEl.textContent = err.message || 'Registration failed.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }
</script>
</body>
</html>
