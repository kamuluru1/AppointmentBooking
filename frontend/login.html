<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomReserve — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">room<span>/</span>reserve</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage and book rooms</p>

    <div id="loginError" class="alert alert-error hidden"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button id="loginBtn" class="btn btn-primary" onclick="handleLogin()">
      Sign in
    </button>

    <p class="auth-switch">
      No account? <a onclick="window.location.href='register.html'">Create one</a>
    </p>

    <p class="auth-switch" style="margin-top:10px; font-size:12px;">
      Demo admin: <code style="color:var(--accent2)">admin@roomreserve.com</code> / <code style="color:var(--accent2)">admin123</code>
    </p>
  </div>
</div>

<script src="api.js"></script>
<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('userId')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    errEl.classList.add('hidden');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const data = await api.login(email, password);
      sessionStorage.setItem('userId',   data.userId);
      sessionStorage.setItem('userName', data.name);
      sessionStorage.setItem('userRole', data.role);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = err.message || 'Invalid email or password.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }
</script>
</body>
</html>
